<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiqueVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@4.5.0/latin.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-down { animation: slideDown 0.2s ease-out; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <a href="/" class="text-xl font-bold text-gray-900">
                    Logo
                </a>

                <!-- Desktop Nav -->
                <div class="hidden lg:flex items-center gap-6">
                    <a href="#" class="text-sm text-gray-600 hover:text-gray-900 transition-colors"></a>
                    <a href="#" class="text-sm text-gray-600 hover:text-gray-900 transition-colors"></a>
                    <a href="#" class="text-sm text-gray-600 hover:text-gray-900 transition-colors"></a>
                    <a href="#" class="text-sm text-gray-600 hover:text-gray-900 transition-colors"></a>
                </div>

                <!-- Right -->
                <div class="flex items-center gap-3">
                    <button onclick="openModal('login')" class="hidden sm:inline-flex px-4 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                        Войти
                    </button>
                    <button onclick="openModal('register')" class="hidden sm:inline-flex px-4 py-2 text-sm font-medium text-white bg-gray-900 hover:bg-gray-800 rounded-lg transition-colors">
                        Регистрация
                    </button>
                    <!-- Mobile Menu Button -->
                    <button onclick="toggleMobileMenu()" class="lg:hidden p-2 text-gray-500 hover:text-gray-700 rounded-lg">
                        <svg id="menuIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                        <svg id="closeIcon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="mobileMenu" class="hidden lg:hidden border-t border-gray-100 bg-white animate-slide-down">
            <div class="px-4 py-4 space-y-3">
                <a href="#" class="block text-sm text-gray-600 hover:text-gray-900"></a>
                <a href="#" class="block text-sm text-gray-600 hover:text-gray-900"></a>
                <a href="#" class="block text-sm text-gray-600 hover:text-gray-900"></a>
                <a href="#" class="block text-sm text-gray-600 hover:text-gray-900"></a>
                <div class="pt-3 flex flex-col gap-2">
                    <button onclick="openModal('login'); toggleMobileMenu()" class="w-full px-4 py-2.5 text-sm font-medium text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Войти</button>
                    <button onclick="openModal('register'); toggleMobileMenu()" class="w-full px-4 py-2.5 text-sm font-medium text-white bg-gray-900 rounded-lg hover:bg-gray-800 transition-colors">Регистрация</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Spacer for fixed nav -->
    <div class="h-16"></div>

    <!-- Main Content -->
    <main class="flex-1">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <h1 class="text-2xl font-bold text-gray-900">Контент</h1>
            <p class="text-gray-500 mt-2 text-sm">Ваш контент здесь</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-50 border-t border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <p class="text-sm text-gray-400 text-center">© 2026. Все права защищены.</p>
        </div>
    </footer>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal('login')"></div>
        <div class="relative flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md animate-fade-in overflow-hidden">
                <div class="px-6 pt-6 pb-4 text-center">
                    <h3 class="text-xl font-bold text-gray-900">Вход</h3>
                    <p class="text-sm text-gray-500 mt-1">Войдите в свой аккаунт</p>
                </div>
                <form class="px-6 pb-6 space-y-4" onsubmit="handleLogin(event)">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" required placeholder="your@email.com" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm outline-none focus:border-gray-900 focus:ring-2 focus:ring-gray-900/10 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                        <input type="password" required placeholder="••••••••" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm outline-none focus:border-gray-900 focus:ring-2 focus:ring-gray-900/10 transition-all">
                    </div>
                    <button type="submit" class="w-full py-3 bg-gray-900 hover:bg-gray-800 text-white font-semibold rounded-xl transition-colors text-sm">Войти</button>
                    <p class="text-center text-sm text-gray-500">Нет аккаунта? <button type="button" onclick="switchModal('login', 'register')" class="text-gray-900 font-medium hover:underline">Зарегистрироваться</button></p>
                </form>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal('register')"></div>
        <div class="relative flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md animate-fade-in overflow-hidden">
                <div class="px-6 pt-6 pb-4 text-center">
                    <h3 class="text-xl font-bold text-gray-900">Регистрация</h3>
                    <p class="text-sm text-gray-500 mt-1">Создайте аккаунт</p>
                </div>
                <form class="px-6 pb-6 space-y-4" onsubmit="handleRegister(event)">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Имя</label>
                            <input type="text" required placeholder="Имя" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm outline-none focus:border-gray-900 focus:ring-2 focus:ring-gray-900/10 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Фамилия</label>
                            <input type="text" required placeholder="Фамилия" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm outline-none focus:border-gray-900 focus:ring-2 focus:ring-gray-900/10 transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" required placeholder="your@email.com" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm outline-none focus:border-gray-900 focus:ring-2 focus:ring-gray-900/10 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                        <input type="password" required placeholder="Минимум 8 символов" class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm outline-none focus:border-gray-900 focus:ring-2 focus:ring-gray-900/10 transition-all">
                    </div>
                    <button type="submit" class="w-full py-3 bg-gray-900 hover:bg-gray-800 text-white font-semibold rounded-xl transition-colors text-sm">Создать аккаунт</button>
                    <p class="text-center text-sm text-gray-500">Уже есть аккаунт? <button type="button" onclick="switchModal('register', 'login')" class="text-gray-900 font-medium hover:underline">Войти</button></p>
                </form>
            </div>
        </div>
    </div>

    <script>
        function openModal(type) {
            document.getElementById(type + 'Modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(type) {
            document.getElementById(type + 'Modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function switchModal(from, to) {
            closeModal(from);
            setTimeout(() => openModal(to), 100);
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const menuIcon = document.getElementById('menuIcon');
            const closeIcon = document.getElementById('closeIcon');
            menu.classList.toggle('hidden');
            menuIcon.classList.toggle('hidden');
            closeIcon.classList.toggle('hidden');
        }

        function handleLogin(e) {
            e.preventDefault();
            closeModal('login');
        }

        function handleRegister(e) {
            e.preventDefault();
            closeModal('register');
        }

        // Close modals on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal('login');
                closeModal('register');
            }
        });
    </script>
</body>
</html>
